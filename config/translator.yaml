# Real-time Japanese -> Korean translator configuration
# Main target: Japanese audio -> Korean subtitle text.
#
# Run:
#   python .\scripts\realtime_audio.py

audio:
  source: loopback
  device_index: null

  # 기존 2.0/0.3보다 문장 연결성이 좋아짐.
  # 너무 길면 지연 증가, 너무 짧으면 ASR 조각화 증가.
  chunk_seconds: 2.8
  overlap_seconds: 0.5

  # 방송/회의 loopback 기준.
  # 너무 높으면 작은 발화를 놓칠 수 있음.
  rms_threshold: 220.0

language:
  direction: ja2ko

asr:
  # small은 속도는 빠르지만 숫자/고유명사 오류가 많았음.
  # medium은 품질/속도 균형용.
  model: medium
  device: cuda
  compute_type: int8_float16

  beam_size: 1
  vad_filter: true
  condition_on_previous_text: false
  no_speech_threshold: 0.6

  # 긴 initial_prompt는 ASR 결과로 누출될 수 있으므로 null 유지.
  initial_prompt: null

nllb:
  model_name: facebook/nllb-200-distilled-600M
  cache_dir: models
  device: cuda
  dtype: fp16

  max_new_tokens: 64
  num_beams: 1
  repetition_penalty: 1.18
  no_repeat_ngram_size: 3
  length_penalty: 0.95

sentence_buffer:
  enabled: true

  # Conversation/meeting profile: keep segments short enough that NLLB does not
  # translate several fast utterances as one long sentence.
  max_chars: 90
  max_wait_sec: 1.5

  # 짧은 회화도 놓치지 않도록 완화.
  min_chars_to_translate: 4

  print_partial_asr: true
  suppress_duplicates: true

quality_filter:
  enabled: true

  # 기존 설정은 실제 방송/대화 조각을 너무 쉽게 drop할 수 있어 완화.
  min_text_len: 2
  min_japanese_ratio: 0.15
  max_repeated_char_ratio: 0.65
  max_compression_ratio: 5.0
  min_avg_logprob: -2.20
  max_no_speech_prob: 0.95

glossary:
  enabled: true

  ja_asr_corrections:
    # general / conversation
    "すいません": "すみません"
    "ちょと": "ちょっと"
    "ちよっと": "ちょっと"
    "ビニールガサ": "ビニール傘"
    "長い顔": "長い傘"
    "長がさ": "長傘"
    "長磨": "長傘"

    # finance / news common
    "かぶか": "株価"
    "株か": "株価"
    "とりひき": "取引"
    "にっけいへいきん": "日経平均"
    "にっけい平均": "日経平均"
    "かわせ": "為替"
    "きんり": "金利"
    "じょうしょう": "上昇"
    "げらく": "下落"
    "せいふ": "政府"
    "けいざい": "経済"


  ko_asr_corrections:
    "라이다": "LiDAR"
    "라이더": "LiDAR"
    "지엔에스에스": "GNSS"
    "아이엠유": "IMU"
    "알오에스": "ROS"
    "알오에스투": "ROS2"

    "일증": "1층"
    "일 층": "1층"
    "일층": "1층"
    "이 층": "2층"
    "이층": "2층"
    "삼 층": "3층"
    "삼층": "3층"

translation_guard:
  enabled: true
  quote_continuation_enabled: true
  statistic_pattern_enabled: true
  preserve_percent: true

llm_refiner:
  enabled: true
  provider: ollama
  model: qwen2.5:3b
  url: http://127.0.0.1:11434/api/chat
  mode: ko_refine

  temperature: 0
  top_p: 0.1
  num_ctx: 384
  num_predict: 40
  timeout_sec: 2.0

  min_chars: 60
  max_chars: 180

  min_korean_ratio: 0.35
  max_latin_ratio: 0.25
  reject_cjk: true
  fallback_on_fail: true
  refine_after_guard: false

  stop:
    - "Japanese:"
    - "Korean:"
    - "English:"
    - "Explanation:"
    - "Analysis:"
    - "The translation"
    - "Let me"
    - "Based on"
    - "Hmm,"
    - "Wait,"
    - "日本語:"
    - "韓国語:"
    - "中国語:"
    - "中文:"
    - "설명:"
    - "분석:"
    - "원문:"
    - "번역:"
    - "不僅"
    - "不仅"
    - "而且"
    - "毫无意义"
    - "强烈批评"
    - "伪善"

output:
  show_partial_asr: true
  show_timing: true
  show_reason: true
  show_normalized_text: true
